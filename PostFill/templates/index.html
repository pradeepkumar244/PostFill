
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FillIt - Post Office Account Opening</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#b71c1c;
    margin-bottom:30px;
}

.section{
    margin-bottom:25px;
}

.section h3{
    color:#444;
    border-bottom:2px solid #ddd;
    padding-bottom:8px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input, textarea, select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
    box-sizing:border-box;
}

textarea{
    height:80px;
}

button{
    width:100%;
    padding:15px;
    background:#d32f2f;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#b71c1c;
}

.logo{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#d32f2f;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
📮 POSTFILL
</div>

<h1>Post Office Account Opening Form</h1>

<form action="/generate" method="post">

<div class="section">
    <input type="text" id="cif" name="cif" placeholder="CIF"><br><br>
<h3>Deposit Details</h3>

<div class="grid">
    <select name="scheme">
        <option value="">Select Scheme</option>
        <option>Savings</option>
        <option>RD</option>
        <option>1YR TD</option>
        <option>2YR TD</option>
        <option>3YR TD</option>
        <option>5YR TD</option>
        <option>MIS</option>
        <option>SSA</option>
        <option>PPF</option>
        <option>NSC</option>
        <option>KVP</option>
        <option>SCSS</option>
        </select>
        
        <input type="number" id="deposit" name="deposit" placeholder="Deposit Amount">
        <input type="text" id="deposit_words" name="deposit_words" placeholder="Amount in Words" readonly>
        
        <script>
        function numberToWords(num) {
            const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine',
                          'Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen',
                          'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
        
            const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty',
                          'Sixty', 'Seventy', 'Eighty', 'Ninety'];
        
            function convert(n) {
                if (n < 20) return ones[n];
                if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? ' ' + ones[n % 10] : '');
                if (n < 1000) return ones[Math.floor(n / 100)] + ' Hundred ' +
                       (n % 100 ? convert(n % 100) : '');
                if (n < 100000) return convert(Math.floor(n / 1000)) + ' Thousand ' +
                       (n % 1000 ? convert(n % 1000) : '');
                if (n < 10000000) return convert(Math.floor(n / 100000)) + ' Lakh ' +
                       (n % 100000 ? convert(n % 100000) : '');
                return convert(Math.floor(n / 10000000)) + ' Crore ' +
                       (n % 10000000 ? convert(n % 10000000) : '');
            }
        
            return convert(num).trim() + ' Rupees Only';
        }
        
        document.getElementById('deposit').addEventListener('input', function() {
            let amount = parseInt(this.value) || 0;
            document.getElementById('deposit_words').value =
                amount ? numberToWords(amount) : '';
        });
        </script>
    
</div>
</div>

<div class="section">
<h3>Applicant Details</h3>

<div class="grid">

<input type="text" id="applicant_name" name="applicant_name" placeholder="Applicant Name">

<input type="text" id="father_name" name="father_name" placeholder="Father Name">
    

<select id="gender" name="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>


<input type="text" id="dob" name="dob" placeholder="DOB">


<input type="text" id="aadhaar" name="aadhaar" placeholder="Aadhaar Number">

<input type="text" id="pan" name="pan" placeholder="PAN Number">

<input type="text" id="mobile" name="mobile" placeholder="Mobile Number">

<input type="email" id="email" name="email" placeholder="Email ID">

</div>
</div>

<div class="section">
<h3>Address Details</h3>

<textarea id="present_address" name="present_address" placeholder="Present Address"></textarea>
<br><br>

<textarea id="permanent_address" name="permanent_address" placeholder="Permanent Address"></textarea>
</div>

<div class="section">
<h3>Nominee Details</h3>

<div class="grid">

<input type="text" name="nominee_name" placeholder="Nominee Name">

<input type="text" name="nominee_relation" placeholder="Relationship">

<input type="text" name="nominee_share" placeholder="Share %">

</div>

</div>

<button type="submit">
Generate PDF
</button>

</form>

</div>
<script>
    document.getElementById("cif").addEventListener("change", function() {
        fetch("/customer/" + this.value)
        .then(r => r.json())
        .then(data => {
            console.log(data);
    
            document.getElementById("applicant_name").value = data.applicant_name || "";
            document.getElementById("father_name").value = data.father_name || "";
            document.getElementById("dob").value = data.dob || "";
            document.getElementById("gender").value = data.gender || "";
            document.getElementById("mobile").value = data.mobile || "";
            document.getElementById("aadhaar").value = data.aadhaar || "";
            document.getElementById("pan").value = data.pan || "";
            document.getElementById("email").value = data.email || "";
    
            if(document.getElementById("present_address"))
                document.getElementById("present_address").value = data.present_address || "";
    
            if(document.getElementById("permanent_address"))
                document.getElementById("permanent_address").value = data.permanent_address || "";
        });
    });
    </script>
</body>
</html>
